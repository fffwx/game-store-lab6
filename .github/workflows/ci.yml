name: CI/CD Pipeline for Game Store

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # JOB 1: Лінтинг
  lint:
    name: 🔍 Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install flake8 black isort
      - name: Run isort
        run: isort --check-only src/ tests/
      - name: Run black
        run: black --check src/ tests/ --line-length 120
      - name: Run flake8
        run: flake8 src/ --max-line-length=120 --statistics

  # JOB 2: Тестування
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest discover tests -v

  # JOB 3: Docker build
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -f Dockerfile -t game-store-app .
          docker build -f Dockerfile.test -t game-store-test .
      - name: Test Docker image
        run: docker run --rm game-store-test