name: CI/CD Pipeline for Game Store

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Можливість ручного запуску

jobs:
  # JOB 1: Лінтинг та перевірка стилю коду
  lint:
    name: 🔍 Linting & Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort

      - name: Run flake8
        run: flake8 src/ --max-line-length=120 --statistics

      - name: Run black check
        run: black --check src/ tests/ --line-length 120

      - name: Run isort check
        run: isort --check-only src/ tests/

      - name: Run pylint
        run: pylint src/ --fail-under=7 --exit-zero

  # JOB 2: Запуск тестів
  test:
    name: 🧪 Running Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover tests -v

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # JOB 3: Збірка Docker образу
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/game-store:latest
            ${{ secrets.DOCKER_USERNAME }}/game-store:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # JOB 4: Тестування Docker контейнера
  docker-test:
    name: 🐳 Docker Container Test
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for test
        run: docker build -t game-store-test -f Dockerfile.test .

      - name: Run tests in Docker
        run: docker run --rm game-store-test

  # JOB 5: Оновлення README бейджа (опціонально)
  update-badge:
    name: 📊 Update Badge
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create badge
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ Tests Passing" > status.txt
          else
            echo "❌ Tests Failing" > status.txt
          fi